services:
  - type: web
    name: ai-compass
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-compass-db
          property: connectionString

databases:
  - name: ai-compass-db
    plan: free