services:
  - type: web
    name: ai-compass
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn wsgi:app --config gunicorn.conf.py"
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        value: https://ai-compass.in
      - key: CANONICAL_HOST
        value: ai-compass.in
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-compass-db
          property: connectionString

databases:
  - name: ai-compass-db
    plan: free