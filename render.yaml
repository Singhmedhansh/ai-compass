services:
  - type: web
    name: ai-compass
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app --workers 1 --timeout 120 --keep-alive 5 --log-level info"
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        value: https://ai-compass.in
      - key: CANONICAL_HOST
        value: ai-compass.in
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-compass-db
          property: connectionString

databases:
  - name: ai-compass-db
    plan: free