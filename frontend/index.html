<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name='impact-site-verification' value='04a8c3be-b344-4fff-8e56-6a6b192b9ac2'>

    <!-- Apply persisted theme before paint to avoid flash-of-wrong-theme -->
    <script>
      try {
        var stored = localStorage.getItem('ai-compass-theme');
        if (stored === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else if (stored !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (e) {}
    </script>

    <!-- Primary -->
    <title>Free AI Tools for Students — 400+ Hand-Tested | AI Compass</title>
    <meta name="description"
          content="400+ free and freemium AI tools, hand-tested for students. Find the right one in 30 seconds. No login, no signup, no ranking tricks." />
    <meta name="keywords"
          content="AI tools, best AI tools, free AI tools, AI for students, coding AI, writing AI, ChatGPT alternatives" />
    <link rel="canonical" href="https://ai-compass.in" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://ai-compass.in" />
    <meta property="og:title"       content="Free AI Tools for Students — 400+ Hand-Tested | AI Compass" />
    <meta property="og:description" content="400+ free and freemium AI tools, hand-tested for students. Find the right one in 30 seconds. No login, no signup, no ranking tricks." />
    <meta property="og:image"       content="https://ai-compass.in/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="AI Compass" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://ai-compass.in" />
    <meta name="twitter:title"       content="Free AI Tools for Students — 400+ Hand-Tested | AI Compass" />
    <meta name="twitter:description" content="400+ free AI tools for students. Hand-tested. No login, no signup." />
    <meta name="twitter:image"       content="https://ai-compass.in/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS home-screen icon: Apple does not render SVG here, so a 180x180
         PNG is required. Generated from the same compass-mark geometry as
         the SVG favicon. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Resource hints — kick off the TCP+TLS handshake for third-party
         origins we KNOW we'll hit, before the parser gets to the actual
         <script>/<link> that needs them. Saves ~150-300ms on the LCP
         on mobile 3G/4G connections. preconnect does DNS+TCP+TLS;
         dns-prefetch is the lighter cousin for origins we MIGHT use. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://us.i.posthog.com" />
    <link rel="preconnect" href="https://us-assets.i.posthog.com" crossorigin />

    <!-- dns-prefetch (lighter than preconnect — DNS lookup only) for the
         tool-logo CDNs hit by every listicle and the directory page.
         Saves the DNS round-trip (~20-100ms per domain) on the FIRST logo
         that needs fetching. preconnect is heavier and we don't want to
         claim those resources are critical; dns-prefetch is the right
         weight for "we'll probably hit these soon". -->
    <link rel="dns-prefetch" href="https://logo.clearbit.com" />
    <link rel="dns-prefetch" href="https://icons.duckduckgo.com" />

    <!-- Font stylesheet — non-blocking pattern.
         media="print" makes the browser fetch this without blocking
         the render path (it's "only for printing", so render is
         unblocked). The onload handler then flips it back to media=all
         which applies it to the screen. The <noscript> fallback covers
         the (vanishingly small) no-JS audience. Lighthouse measured
         the OLD blocking variant as costing ~950ms on mobile 4G. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>

          // Defer the actual init() until the browser is idle — that
          // pushes the array.js fetch + parse off the critical render
          // path. requestIdleCallback isn't in Safari yet, so we
          // fall back to a setTimeout that fires after window.load.
          // Worst case the user's first 1-2 pageviews don't fire to
          // PostHog, which is a perfectly fine trade for mobile FCP.
          var initPosthog = function() {
            posthog.init('phc_kMaYwCVYoqvo2DdSSYeJa9TqYFyarnSSLwJn4NhpCGmU', {
              api_host: 'https://us.i.posthog.com',
              defaults: '2026-01-30',
              person_profiles: 'identified_only',
              persistence: 'memory',
              disable_session_recording: true,
            });
          };
          if ('requestIdleCallback' in window) {
            requestIdleCallback(initPosthog, { timeout: 4000 });
          } else {
            window.addEventListener('load', function() { setTimeout(initPosthog, 0); });

      } catch (e) {
        console.warn('PostHog init skipped:', e && e.message);

    </script>
    <!-- Critical CSS for the boot loader: shown until the JS bundle parses
         and React mounts (createRoot replaces #root children, removing it).
         Inline because the app stylesheet hasn't loaded at this point. -->
    <style>
      #app-boot{position:fixed;inset:0;display:flex;align-items:center;
        justify-content:center;background:#fafaf9;z-index:9999}
      html[data-theme="dark"] #app-boot{background:#0e1311}
      #app-boot .needle{transform-box:fill-box;transform-origin:center;
        animation:abspin 1.4s linear infinite}
      @keyframes abspin{to{transform:rotate(360deg)}}
      @media (prefers-reduced-motion:reduce){#app-boot .needle{animation:none}}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-boot" aria-hidden="true">
        <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="23" fill="none" stroke="#2fb389" stroke-width="2.5"/>
          <circle cx="32" cy="32" r="16" fill="none" stroke="#2fb389" stroke-opacity=".3" stroke-width="1"/>
          <g class="needle">
            <polygon points="32,12 27,33 32,31 37,33" fill="#2fb389"/>
            <polygon points="32,52 28,31 32,33 36,31" fill="#2fb389" fill-opacity=".4"/>
            <circle cx="32" cy="32" r="2.6" fill="#fafaf9" stroke="#2fb389" stroke-width="1"/>
          </g>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
