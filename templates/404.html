{% extends "base.html" %}

{% block title %}Page Not Found | AI Compass{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
  <div class="rounded-2xl border border-white/10 bg-white/5 p-8 text-center">
    <div class="text-4xl mb-3">404</div>
    <h1 class="text-zinc-100 text-2xl font-semibold">Page not found</h1>
    <p class="text-zinc-400 text-sm mt-2">The page you are looking for does not exist or may have moved.</p>
    <div class="mt-6">
      <a href="{{ url_for('main.index') }}" class="action-btn inline-flex items-center gap-2 rounded-lg px-4 py-2 bg-cyan-500/20 border border-cyan-400/30 text-cyan-100 hover:bg-cyan-500/30 transition-all">Go to homepage</a>
    </div>
  </div>
</div>
{% endblock %}
