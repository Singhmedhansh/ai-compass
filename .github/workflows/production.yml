name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov pytest-flask

      - name: Lint Codebase (Ruff)
        run: ruff check .

      - name: Run Tests
        run: pytest tests/ --cov=app --cov-report=xml
        env:
          DATABASE_URL: sqlite:///:memory:
          SECRET_KEY: test-secret-key-12345
          WTF_CSRF_ENABLED: False

  build-and-deploy:
    name: Build & Deploy
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Placeholder for Triggering Render/Fly.io/Railway CLI Deployment"
          # Example: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
